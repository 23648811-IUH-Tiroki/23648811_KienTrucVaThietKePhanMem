services:
  mongo:
    image: mongo:latest
    container_name: bai2_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  nodeapp:
    build: .
    container_name: bai2_nodeapp
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongo:27017/mydb
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network: