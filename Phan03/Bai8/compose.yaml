services:
  redis:
    image: redis:latest
    container_name: bai8_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: bai8_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  celery:
    build: .
    container_name: bai8_celery
    command: celery -A myproject worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis