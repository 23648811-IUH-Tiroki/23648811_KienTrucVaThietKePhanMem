services:
  redis:
    image: redis:latest
    container_name: bai5_redis
    restart: always
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    container_name: bai5_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votesdb
    ports:
      - "5432:5432"

  vote:
    image: dockersamples/examplevotingapp_vote
    container_name: bai5_vote
    restart: always
    ports:
      - "5000:80"
    depends_on:
      - redis

  result:
    image: dockersamples/examplevotingapp_result
    container_name: bai5_result
    restart: always
    ports:
      - "5001:80"
    depends_on:
      - db

  worker:
    image: dockersamples/examplevotingapp_worker
    container_name: bai5_worker
    restart: always
    depends_on:
      - redis
      - db