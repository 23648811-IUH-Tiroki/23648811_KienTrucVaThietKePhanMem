services:
  mysql:
    image: mysql:8.0
    container_name: bai8_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"

  nodeapp:
    build: .
    container_name: bai8_nodeapp
    restart: always
    depends_on:
      - mysql
    ports:
      - "3001:3000"