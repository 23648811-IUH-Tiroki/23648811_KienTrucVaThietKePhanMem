services:
  postgres:
    image: postgres:latest
    container_name: bai11_postgres
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    container_name: bai11_adminer
    restart: always
    depends_on:
      - postgres
    ports:
      - "8083:8080"