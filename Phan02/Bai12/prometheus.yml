services:
  prometheus:
    image: prom/prometheus
    container_name: bai12_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: bai12_grafana
    ports:
      - "3002:3000"

  node-exporter:
    image: prom/node-exporter
    container_name: bai12_node_exporter
    ports:
      - "9100:9100"